name: Virtus Test Suite

on: [push, pull_request]

defaults:
  run:
    shell: bash

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd porter_robot
          pytest tests/unit/ -v --tb=short --junitxml=test-results/unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: porter_robot/test-results/

  unit-tests-firmware:
    name: Firmware Ztest
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Ztest suite
        run: |
          cd porter_robot/esp32_firmware
          twister -T tests/ -p native_sim --no-color

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy
      options: --user root
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y python3-pip
          pip install pytest

      - name: Build workspace
        run: |
          source /opt/ros/jazzy/setup.bash
          cd porter_robot
          rosdep install --from-paths src --ignore-src -r -y --skip-keys="ament_python"
          colcon build --symlink-install --cmake-args -Wno-dev

      - name: Run integration tests
        run: |
          source /opt/ros/jazzy/setup.bash
          source porter_robot/install/setup.bash
          cd porter_robot
          pytest tests/integration/ -v --timeout=120 --junitxml=test-results/integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: porter_robot/test-results/

  system-tests:
    name: System Tests (Gazebo)
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:jazzy-desktop
      options: --user root
    needs: [integration-tests]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y python3-pip
          pip install pytest

      - name: Build workspace
        run: |
          source /opt/ros/jazzy/setup.bash
          cd porter_robot
          rosdep install --from-paths src --ignore-src -r -y --skip-keys="ament_python"
          colcon build --symlink-install --cmake-args -Wno-dev

      - name: Run system tests
        run: |
          source /opt/ros/jazzy/setup.bash
          source porter_robot/install/setup.bash
          cd porter_robot
          pytest tests/system/ -v --timeout=300 --junitxml=test-results/system.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-results
          path: porter_robot/test-results/
