# Porter Robot — Sensor Fusion Configuration
# Board: ESP32-DevKitC (esp32_devkitc/esp32/procpu)

# --- C++ Support ---
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# --- Transport (RPi communication) ---
# ESP32-WROOM uses hardware UART2 + external USB-UART bridge (CP2102/CH340).
# For ESP32-S2/S3 with native USB, change to CONFIG_PORTER_TRANSPORT_CDC_ACM=y
# and add: CONFIG_USB_DEVICE_STACK=y, CONFIG_USBD_CDC_ACM_CLASS=y, CONFIG_UART_LINE_CTRL=y
CONFIG_SERIAL=y
CONFIG_PORTER_TRANSPORT=y
CONFIG_PORTER_TRANSPORT_UART=y

# --- I2C for ToF sensors ---
CONFIG_I2C=y

# --- GPIO for ultrasonic trigger/echo, sensor interrupts ---
CONFIG_GPIO=y

# --- ADC for analog sensors ---
CONFIG_ADC=y

# --- State Machine Framework ---
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y

# --- Zbus (internal message passing) ---
CONFIG_ZBUS=y
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- Shell (development only) ---
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# --- Task Watchdog ---
CONFIG_TASK_WDT=y

# --- Thread monitoring ---
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y

# --- System ---
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
