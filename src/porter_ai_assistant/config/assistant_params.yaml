# =============================================================================
# Porter AI Assistant — ROS 2 Parameters
#
# Model: Qwen 2.5 1.5B Instruct (Qwen/Qwen2.5-1.5B-Instruct-GGUF)
# Runtime: llama-cpp-python (GGUF quantized models on RPi 4/5)
#
# RPi 5 constraints: <2 GB RSS, <3s inference latency
# Model size: ~1.0 GB (Q4_K_M) — comfortable on RPi 5 (8 GB)
# =============================================================================

porter_ai_assistant:
  ros__parameters:
    # ── Model Paths ──────────────────────────────────────────────────────────
    # Base GGUF model + LoRA adapter directory.
    # IMPORTANT: Do NOT merge QLoRA into base — use runtime LoRA loading
    # (see CLAUDE.md lesson #36 re: QLoRA merge degradation).
    # Source: https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF
    model_path: "models/gguf/qwen2.5-1.5b-instruct-q4_k_m.gguf"   # Base GGUF

    # Directory containing LoRA adapter GGUF files.
    # Expected files: porter-conversational-lora-f16.gguf,
    #                 porter-tool_use-lora-f16.gguf
    lora_dir: "models/gguf"

    # Default adapter loaded on startup ('conversational' or 'tool_use')
    default_adapter: "conversational"

    # ── Generation Parameters ────────────────────────────────────────────────
    # Balanced defaults for grounded airport responses:
    max_tokens: 256               # Max output tokens per response
    temperature: 0.7              # Balanced for grounded responses
    top_p: 0.9                    # Slightly tighter nucleus sampling
    top_k: 50                     # Balanced sampling for Qwen 2.5
    min_p: 0.0
    repeat_penalty: 1.1           # Repetition penalty

    # ── Model Loading (CPU-optimized for RPi) ────────────────────────────────
    n_ctx: 1024                   # Context window (tokens) — 1024 for airport Q&A, saves ~28 MB
    n_batch: 512                  # Batch size for prompt eval (512 = llama.cpp default, optimal)
    n_threads: 2                  # CPU threads (2 = reserve 2 cores for SLAM/Nav2 on RPi)
    n_threads_batch: 0            # Batch eval threads (0 = same as n_threads)
    n_gpu_layers: 0               # GPU offload (0 for RPi CPU-only, >0 for Jetson)
    flash_attn: false             # Flash attention (false for x86, test on ARM RPi 5)
    use_mmap: true                # Memory-map model file (essential for RPi — saves RAM)
    use_mlock: false              # Lock model in RAM (requires privileges, use on RPi 5 8GB)

    # ── Query Classification ─────────────────────────────────────────────────
    # Keywords that route to tool-use adapter instead of conversational
    tool_keywords:
      - "take me"
      - "escort"
      - "carry my"
      - "weigh"
      - "flight status"
      - "flight number"
      - "directions to"
      - "navigate"
      - "find nearest"
      - "where is the nearest"
      - "call assistance"
      - "wheelchair"
      - "translate"
      - "remind me"
      - "set reminder"
      - "wait time"
      - "queue"
      - "show map"
      - "report"
      - "incident"

    # ── System Prompt Selection ──────────────────────────────────────────────
    default_system_prompt: "default"   # Key from system_prompts.yaml
    system_prompts_file: "data/system_prompts.yaml"

    # ── Service Configuration ────────────────────────────────────────────────
    service_timeout_sec: 5.0      # Max time to wait for inference
    warmup_on_start: true         # Run dummy inference on startup to warm caches
    log_queries: false            # Log queries to file (privacy: disable in production)

    # ── Health Monitoring ────────────────────────────────────────────────────
    health_check_interval_sec: 30.0   # Periodic health check interval
    max_memory_mb: 1800               # Alert if RSS exceeds this (MB)
    max_latency_warn_ms: 2000.0       # Warn if inference > 2s
    max_latency_error_ms: 5000.0      # Error if inference > 5s
